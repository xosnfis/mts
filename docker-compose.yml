version: '3.8'

services:
  open-webui:
    build:
      context: open-webui-main
      dockerfile: Dockerfile
    image: gpthub:latest
    container_name: gpthub
    ports:
      - "3000:8080"
    environment:
      # ── Core API ──────────────────────────────────────────────────────
      - OPENAI_API_BASE_URL=https://api.gpt.mws.ru/v1
      - OPENAI_API_KEY=sk-ewgiaPC3A6pPDYHwR8siVA
      - VERIFY_SSL=False

      # ── Default model ─────────────────────────────────────────────────
      - DEFAULT_MODELS=llama-3.3-70b-instruct

      # ── Audio / STT ───────────────────────────────────────────────────
      - AUDIO_STT_ENGINE=openai
      - AUDIO_STT_OPENAI_API_BASE_URL=https://api.gpt.mws.ru/v1
      - AUDIO_STT_OPENAI_API_KEY=sk-ewgiaPC3A6pPDYHwR8siVA
      - AUDIO_STT_MODEL=whisper-turbo-local

      # ── Image Generation — handled by GPTHub router ───────────────────
      - IMAGE_GENERATION_ENGINE=

      # ── RAG / Embeddings ──────────────────────────────────────────────
      - RAG_EMBEDDING_ENGINE=openai
      - RAG_OPENAI_API_BASE_URL=https://api.gpt.mws.ru/v1
      - RAG_OPENAI_API_KEY=sk-ewgiaPC3A6pPDYHwR8siVA
      - RAG_EMBEDDING_MODEL=bge-m3

      # ── GPTHub router config ──────────────────────────────────────────
      - GPTHUB_BASE_URL=https://api.gpt.mws.ru/v1
      - GPTHUB_API_KEY=sk-ewgiaPC3A6pPDYHwR8siVA
      - GPTHUB_OPENWEBUI_BASE_URL=http://localhost:8080
      - GPTHUB_MODEL_DEFAULT=llama-3.3-70b-instruct
      - GPTHUB_MODEL_CODE=qwen3-coder-480b-a35b
      - GPTHUB_MODEL_VISION=qwen2.5-vl-72b
      - GPTHUB_MODEL_VISION_ALT=cotype-pro-vl-32b
      - GPTHUB_MODEL_AUDIO=whisper-turbo-local
      - GPTHUB_MODEL_MEMORY=mts-anya
      - GPTHUB_MODEL_EMBED=bge-m3

    volumes:
      - open-webui-data:/app/backend/data
      - ./generated_pptx:/app/backend/data/pptx
      - ./data/downloads:/app/backend/data/downloads
    restart: always

  sqlite-web:
    image: coleifer/sqlite-web
    container_name: gpthub-db
    ports:
      - "8082:8080"
    environment:
      - SQLITE_DATABASE=/data/smart_router_memory.db
    volumes:
      - open-webui-data:/data
    restart: always

volumes:
  open-webui-data:
